<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>前端自学站 · HTML / CSS / JS / SQL 零基础入门</title>
  <meta name="description" content="零基础前端自学站 —— HTML/CSS/JavaScript/SQL 一站学，浏览器本地运行，打开网页就能学、能写、能跑。" />

  <!-- PWA / iOS 添加到桌面 -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="前端自学" />
  <meta name="theme-color" content="#3D7EFF" />
  <link rel="apple-touch-icon" href="assets/images/apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/images/apple-touch-icon.png" />
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />

  <!-- Tailwind Play CDN（只用工具类，色板靠 CSS 变量） -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { corePlugins: { preflight: false } };
  </script>

  <!-- 字体图标 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css" />

  <!-- 样式 -->
  <link rel="stylesheet" href="assets/css/theme.css" />
  <link rel="stylesheet" href="assets/css/app.css" />
</head>
<body>
  <nav id="nav"></nav>
  <div id="app-layout">
    <aside id="sidebar"></aside>
    <div id="sidebar-overlay"></div>
    <main id="app-main"></main>
  </div>

  <!-- 数据 -->
  <script src="data/course.js"></script>
  <script src="data/quiz.js"></script>
  <script src="data/search.js"></script>

  <script src="assets/js/storage.js"></script>
  <script src="assets/js/theme.js"></script>
  <script src="assets/js/router.js"></script>

  <!-- 组件 -->
  <script src="components/nav.js"></script>
  <script src="components/sidebar.js"></script>
  <script src="components/editor.js"></script>
  <script src="components/exam-modal.js"></script>

  <!-- 页面 -->
  <script src="pages/home.js"></script>
  <script src="pages/lesson.js"></script>
  <script src="pages/quiz.js"></script>
  <script src="pages/certificate.js"></script>
  <script src="pages/notfound.js"></script>

  <script src="assets/js/app.js"></script>
